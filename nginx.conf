# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name oicoruja.com.br www.oicoruja.com.br;

    return 301 https://oicoruja.com.br$request_uri;
}

# Redirect www → non-www (HTTPS)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.oicoruja.com.br;

    include /config/nginx/ssl.conf;

    return 301 https://oicoruja.com.br$request_uri;
}

# Main site
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name oicoruja.com.br;

    include /config/nginx/ssl.conf;

    # Document root — where you put the built dist/ contents
    root /config/www/oicoruja.com.br/dist;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache fingerprinted JS/CSS assets forever (Vite hashes filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache fonts forever
    location /fonts/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Never cache index.html so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy        "strict-origin" always;
}
